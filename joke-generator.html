<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Random Joke Generator - Get funny jokes instantly from a public API">
  <meta name="keywords" content="joke generator, funny jokes, API, entertainment">
  <meta name="author" content="RizzAstro Team">
  
  <title>Random Joke Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 50px 40px;
      max-width: 600px;
      width: 100%;
      text-align: center;
      animation: slideIn 0.5s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      color: #667eea;
      margin-bottom: 10px;
      font-size: 32px;
    }

    .subtitle {
      color: #999;
      margin-bottom: 40px;
      font-size: 14px;
    }

    .joke-display {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 35px;
      border-radius: 15px;
      margin-bottom: 30px;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .joke-display::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -10%;
      width: 300px;
      height: 300px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
    }

    .joke-text {
      font-size: 18px;
      line-height: 1.6;
      position: relative;
      z-index: 1;
      font-weight: 500;
    }

    .joke-type {
      display: inline-block;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .loading {
      display: none;
      color: #667eea;
      font-weight: 600;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .button-group {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      padding: 12px 30px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 600;
      flex: 1;
      min-width: 140px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.6);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #667eea;
      border: 2px solid #667eea;
    }

    .btn-secondary:hover {
      background: #667eea;
      color: white;
    }

    .joke-category {
      margin-top: 30px;
      padding-top: 30px;
      border-top: 2px solid #f0f0f0;
    }

    .category-label {
      color: #666;
      font-size: 14px;
      margin-bottom: 15px;
      font-weight: 600;
    }

    .categories {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .category-btn {
      padding: 8px 16px;
      border: 2px solid #ddd;
      background: white;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.3s ease;
      color: #666;
      font-weight: 500;
    }

    .category-btn:hover {
      border-color: #667eea;
      color: #667eea;
    }

    .category-btn.active {
      background: #667eea;
      border-color: #667eea;
      color: white;
    }

    .stats {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 2px solid #f0f0f0;
      color: #999;
      font-size: 13px;
    }

    .error {
      background: #fff3cd;
      color: #856404;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: none;
    }

    .success {
      background: #d4edda;
      color: #155724;
      padding: 10px 15px;
      border-radius: 8px;
      margin-bottom: 15px;
      display: none;
      font-size: 13px;
    }

    @media(max-width: 600px) {
      .container {
        padding: 30px 20px;
      }

      h1 {
        font-size: 24px;
      }

      .joke-text {
        font-size: 16px;
      }

      .btn {
        min-width: 100px;
        padding: 10px 20px;
      }

      .button-group {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>😂 Joke Generator</h1>
  <p class="subtitle">Get unlimited funny jokes - Click to laugh!</p>

  <div class="error" id="errorMsg"></div>
  <div class="success" id="successMsg"></div>

  <div class="joke-display">
    <div>
      <div class="joke-type" id="jokeType">Any</div>
      <div class="loading" id="loading">
        <div class="spinner"></div>
        Loading joke...
      </div>
      <div class="joke-text" id="jokeText">Click "Get Joke" to start laughing! 🎉</div>
    </div>
  </div>

  <div class="button-group">
    <button class="btn btn-primary" onclick="fetchJoke()">🚀 Get Joke</button>
    <button class="btn btn-secondary" onclick="copyToClipboard()">📋 Copy</button>
  </div>

  <div class="joke-category">
    <p class="category-label">📂 Select Category (Optional)</p>
    <div class="categories">
      <button class="category-btn active" onclick="setCategory('any')">Any</button>
      <button class="category-btn" onclick="setCategory('general')">General</button>
      <button class="category-btn" onclick="setCategory('knock-knock')">Knock-Knock</button>
      <button class="category-btn" onclick="setCategory('programming')">Programming</button>
    </div>
  </div>

  <div class="stats">
    <p>💬 Jokes Generated: <strong id="jokeCount">0</strong></p>
    <p>⏰ Last Updated: <strong id="lastUpdate">Never</strong></p>
  </div>
</div>

<script>
  let currentJoke = '';
  let jokeCount = 0;
  let selectedCategory = 'any';

  // Initialize - Load first joke
  window.addEventListener('load', () => {
    fetchJoke();
  });

  async function fetchJoke() {
    const loadingEl = document.getElementById('loading');
    const jokeTextEl = document.getElementById('jokeText');
    const jokeTypeEl = document.getElementById('jokeType');
    const errorEl = document.getElementById('errorMsg');

    errorEl.style.display = 'none';
    loadingEl.style.display = 'block';
    jokeTextEl.style.opacity = '0.5';

    try {
      let url = 'https://official-joke-api.appspot.com/';

      if (selectedCategory === 'any') {
        url += 'random_joke';
      } else if (selectedCategory === 'knock-knock') {
        url += 'jokes/knock-knock/random';
      } else if (selectedCategory === 'programming') {
        url += 'jokes/programming/random';
      } else {
        url += `jokes/${selectedCategory}/random`;
      }

      const response = await fetch(url);

      if (!response.ok) {
        throw new Error('Failed to fetch joke');
      }

      const data = await response.json();
      
      // Format joke text
      if (data.setup && data.punchline) {
        currentJoke = `${data.setup}\n\n${data.punchline}`;
        jokeTypeEl.textContent = data.type ? data.type.toUpperCase() : 'JOKE';
      } else {
        currentJoke = data.joke || 'A joke happened here!';
        jokeTypeEl.textContent = 'RANDOM';
      }

      jokeTextEl.textContent = currentJoke;
      jokeTextEl.style.opacity = '1';
      loadingEl.style.display = 'none';

      // Update stats
      jokeCount++;
      document.getElementById('jokeCount').textContent = jokeCount;
      
      const now = new Date();
      document.getElementById('lastUpdate').textContent = now.toLocaleTimeString();

      // Show success message
      showSuccess('Joke loaded! Ready to laugh? 😄');

    } catch (error) {
      console.error('Error:', error);
      jokeTextEl.textContent = 'Oops! Could not load joke. Try again!';
      jokeTextEl.style.opacity = '1';
      loadingEl.style.display = 'none';
      
      errorEl.textContent = '❌ Error: ' + error.message;
      errorEl.style.display = 'block';
    }
  }

  function setCategory(category) {
    selectedCategory = category;

    // Update button styles
    document.querySelectorAll('.category-btn').forEach(btn => {
      btn.classList.remove('active');
    });
    event.target.classList.add('active');

    // Fetch new joke
    fetchJoke();
  }

  function copyToClipboard() {
    if (!currentJoke) {
      showError('No joke to copy! Get a joke first.');
      return;
    }

    navigator.clipboard.writeText(currentJoke).then(() => {
      showSuccess('✅ Joke copied to clipboard!');
    }).catch(() => {
      showError('Could not copy to clipboard');
    });
  }

  function showSuccess(message) {
    const successEl = document.getElementById('successMsg');
    successEl.textContent = message;
    successEl.style.display = 'block';
    
    setTimeout(() => {
      successEl.style.display = 'none';
    }, 3000);
  }

  function showError(message) {
    const errorEl = document.getElementById('errorMsg');
    errorEl.textContent = '❌ ' + message;
    errorEl.style.display = 'block';
    
    setTimeout(() => {
      errorEl.style.display = 'none';
    }, 4000);
  }

  // Keyboard shortcut: Press SPACE to get new joke
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' && e.target.tagName !== 'BUTTON') {
      e.preventDefault();
      fetchJoke();
    }
  });
</script>

</body>
</html>
